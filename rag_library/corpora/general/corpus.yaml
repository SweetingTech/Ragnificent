corpus_id: general
description: >
  General-purpose ingest corpus.
  Drop any supported file into the top-level /ingest folder and run
  POST /api/ingest/run (or POST /api/ingest/run?corpus_id=general) to
  process it into the vector database.
retain_on_missing: true
# source_path is resolved relative to the working directory where the server
# is started (the project root).  This points to the top-level ingest/ folder.
source_path: "ingest"
chunking:
  default:
    strategy: "pdf_sections"
    max_tokens: 700
    overlap_tokens: 80
models:
  answer:
    provider: "ollama"
    base_url: "http://localhost:11434"
    model: "llama3"
