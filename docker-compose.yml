services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ragnificent:
    build: .
    env_file:
      - .env
    volumes:
      - ./rag_library:/app/rag_library
      - ./config.docker.yaml:/app/config.yaml
      - ./models_catalog.yaml:/app/models_catalog.yaml:ro
      - ./embedding_presets.yaml:/app/embedding_presets.yaml:ro
      # Optional: mount host document folders here and point source_path at the
      # container-visible path, for example:
      # - D:/Books:/imports:ro
    depends_on:
      - qdrant
    ports:
      - "${RAGNIFICENT_HOST_PORT:-8008}:8008"
    restart: unless-stopped

volumes:
  qdrant_storage:
