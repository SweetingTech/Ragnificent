services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ragnificent:
    build: .
    env_file:
      - .env
    volumes:
      - ./rag_library:/app/rag_library
      - ./config.docker.yaml:/app/config.yaml
      - ./models_catalog.yaml:/app/models_catalog.yaml:ro
      - ./embedding_presets.yaml:/app/embedding_presets.yaml:ro
      # Legacy local-administration workflow only: mount host document folders
      # here and point a preconfigured corpus source_path at the
      # container-visible path. New Agent Harness/Wiki.js intake uses the
      # authenticated source-receipt root mapping instead.
      # - D:/Books:/imports:ro
    depends_on:
      - qdrant
    ports:
      - "127.0.0.1:${RAGNIFICENT_HOST_PORT:-8008}:8008"
    restart: unless-stopped

volumes:
  qdrant_storage:
