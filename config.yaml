extraction:
  normalize:
    dehyphenate: true
    strip_headers_footers: true
  pdf_backend: pymupdf
ingest:
  lock_file: rag_library/.locks/ingest.lock
  max_parallel_files: 1
  ocr_trigger:
    min_chars_per_page: 200
    min_dictionary_word_ratio: 0.35
  poll_interval_seconds: 300
library_root: rag_library
models:
  answer:
    model: claude-opus-4-6
    provider: anthropic
  embeddings:
    base_url: http://localhost:11434
    model: nomic-embed-text
    provider: openrouter
ocr:
  backend: ocrmypdf
  ocrmypdf:
    cache_dir: rag_library/cache/ocr
    clean: true
    deskew: true
    language: eng
    rotate_pages: true
state_db:
  path: rag_library/state/ingest.sqlite
vector_db:
  backend: qdrant
  collection_prefix: instance01
  hnsw_on_disk: true
  on_disk: true
  url: http://localhost:6333
  vector_size: null
