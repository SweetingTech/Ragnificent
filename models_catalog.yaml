# ---------------------------------------------------------------------------
# Ragnificent Models Catalog
# Edit this file to add, remove, or reorder models in the UI dropdowns.
# provider keys must match those used in config.yaml and factory.py.
# ---------------------------------------------------------------------------

embedding:

  ollama:
    models:
      - id: "nomic-embed-text"
        display_name: "nomic-embed-text"
        notes: "Best all-around local embedding. 768-dim. Recommended default."
      - id: "mxbai-embed-large"
        display_name: "mxbai-embed-large"
        notes: "1024-dim. Better quality than nomic, needs more VRAM."
      - id: "snowflake-arctic-embed"
        display_name: "snowflake-arctic-embed"
        notes: "1024-dim. Strong on technical and long documents."
      - id: "all-minilm"
        display_name: "all-minilm"
        notes: "384-dim. Tiny and fast — only if resources are very tight."

  openai:
    models:
      - id: "text-embedding-3-small"
        display_name: "text-embedding-3-small"
        notes: "1536-dim. Best value: $0.02/M tokens. Recommended default."
      - id: "text-embedding-3-large"
        display_name: "text-embedding-3-large"
        notes: "3072-dim. Highest accuracy. $0.13/M tokens."
      - id: "text-embedding-ada-002"
        display_name: "text-embedding-ada-002 (legacy)"
        notes: "1536-dim. Legacy — only use if you have existing ada-002 vectors."

  openrouter:
    models:
      - id: "qwen/qwen3-embedding-8b"
        display_name: "Qwen3 Embedding 8B"
        notes: "$0.01/M tokens, 32K context. Best value overall — top MTEB scores."
      - id: "qwen/qwen3-embedding-4b"
        display_name: "Qwen3 Embedding 4B"
        notes: "$0.02/M tokens, 33K context. Slightly lower quality than 8B."
      - id: "openai/text-embedding-3-small"
        display_name: "OpenAI text-embedding-3-small (via OpenRouter)"
        notes: "$0.02/M tokens. Reliable fallback."
      - id: "openai/text-embedding-3-large"
        display_name: "OpenAI text-embedding-3-large (via OpenRouter)"
        notes: "$0.13/M tokens. Highest OpenAI quality."
      - id: "google/gemini-embedding-001"
        display_name: "Google Gemini Embedding 001"
        notes: "$0.15/M tokens, 20K context. Top MTEB multilingual."
      - id: "mistralai/mistral-embed"
        display_name: "Mistral Embed"
        notes: "$0.10/M tokens, 8K context. 1024-dim."
      - id: "mistralai/codestral-embed-2505"
        display_name: "Mistral Codestral Embed (Code)"
        notes: "$0.15/M tokens. Specialized for code repositories."
      - id: "sentence-transformers/all-mpnet-base-v2"
        display_name: "Sentence Transformers all-mpnet-base-v2"
        notes: "$0.005/M tokens, 768-dim. Short text / sentence similarity."

# ---------------------------------------------------------------------------

llm:

  ollama:
    models:
      - id: "llama3"
        display_name: "Llama 3 8B"
        notes: "Best all-around local model. Good default choice."
      - id: "llama3:70b"
        display_name: "Llama 3 70B"
        notes: "Much higher quality than 8B. Needs significant VRAM (~48GB)."
      - id: "mistral"
        display_name: "Mistral 7B"
        notes: "Fast, strong instruction following. Great for Q&A."
      - id: "phi3"
        display_name: "Phi-3 Mini"
        notes: "Very fast and efficient. Good for low-RAM setups."
      - id: "phi3:medium"
        display_name: "Phi-3 Medium"
        notes: "Better quality than Mini. Still efficient."
      - id: "gemma"
        display_name: "Gemma 7B"
        notes: "Google's open model. Balanced quality and speed."
      - id: "codellama"
        display_name: "CodeLlama"
        notes: "Specialized for code. Good for programming corpora."
      - id: "deepseek-r1"
        display_name: "DeepSeek R1"
        notes: "Strong reasoning model. Good for complex analysis."

  openai:
    models:
      - id: "gpt-4o"
        display_name: "GPT-4o"
        notes: "Most capable OpenAI model. Best for complex RAG tasks."
      - id: "gpt-4o-mini"
        display_name: "GPT-4o Mini"
        notes: "Best cost/performance for most tasks. Recommended default."
      - id: "gpt-4-turbo"
        display_name: "GPT-4 Turbo"
        notes: "128K context window. Good for long document Q&A."
      - id: "gpt-3.5-turbo"
        display_name: "GPT-3.5 Turbo"
        notes: "Low cost and fast. Good for simple retrieval Q&A."
      - id: "o1"
        display_name: "o1"
        notes: "Deep reasoning model. Slow but excellent for complex analysis."
      - id: "o3-mini"
        display_name: "o3 Mini"
        notes: "Fast reasoning model. Good balance of speed and intelligence."

  anthropic:
    models:
      - id: "claude-opus-4-6"
        display_name: "Claude Opus 4.6"
        notes: "Most powerful Claude model. Best for complex reasoning tasks."
      - id: "claude-sonnet-4-6"
        display_name: "Claude Sonnet 4.6"
        notes: "Excellent balance of intelligence and speed. Recommended default."
      - id: "claude-haiku-4-5-20251001"
        display_name: "Claude Haiku 4.5"
        notes: "Fastest and cheapest Claude. Good for simple Q&A."
      - id: "claude-3-5-sonnet-20241022"
        display_name: "Claude 3.5 Sonnet"
        notes: "Previous generation. Highly capable."
      - id: "claude-3-opus-20240229"
        display_name: "Claude 3 Opus"
        notes: "Previous generation flagship. Slower and expensive."
      - id: "claude-3-haiku-20240307"
        display_name: "Claude 3 Haiku"
        notes: "Previous generation fast/cheap model."

  openrouter:
    models:
      - id: "openai/gpt-4o"
        display_name: "GPT-4o (via OpenRouter)"
        notes: "OpenAI's most capable model, routed through OpenRouter."
      - id: "openai/gpt-4o-mini"
        display_name: "GPT-4o Mini (via OpenRouter)"
        notes: "Best value OpenAI model via OpenRouter."
      - id: "anthropic/claude-3.5-sonnet"
        display_name: "Claude 3.5 Sonnet (via OpenRouter)"
        notes: "Highly capable Claude model via OpenRouter."
      - id: "anthropic/claude-3-opus"
        display_name: "Claude 3 Opus (via OpenRouter)"
        notes: "Anthropic's previous flagship model."
      - id: "meta-llama/llama-3.1-70b-instruct"
        display_name: "Llama 3.1 70B Instruct"
        notes: "Meta's large open model. Strong reasoning."
      - id: "meta-llama/llama-3.1-8b-instruct"
        display_name: "Llama 3.1 8B Instruct"
        notes: "Fast and cheap open model."
      - id: "google/gemini-pro-1.5"
        display_name: "Google Gemini Pro 1.5"
        notes: "Google's model with very long context support."
      - id: "google/gemini-flash-1.5"
        display_name: "Google Gemini Flash 1.5"
        notes: "Fast and low cost. Good for high-volume Q&A."
      - id: "mistralai/mistral-large"
        display_name: "Mistral Large"
        notes: "Mistral's flagship model. Strong multilingual."
      - id: "mistralai/mixtral-8x7b-instruct"
        display_name: "Mixtral 8x7B Instruct"
        notes: "Mixture-of-experts model. Fast with good quality."
      - id: "deepseek/deepseek-r1"
        display_name: "DeepSeek R1"
        notes: "Strong open-weight reasoning model."
      - id: "qwen/qwen-2.5-72b-instruct"
        display_name: "Qwen 2.5 72B Instruct"
        notes: "Strong multilingual model. Excellent for non-English content."
